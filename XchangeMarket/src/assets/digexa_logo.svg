<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" fill="none">
  <!-- Font definition for better rendering if supported, defaulting to sans-serif -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600&amp;display=swap');
    </style>
  </defs>

  <!-- Icon Group -->
  <g transform="translate(5, 5)">
    <!-- Red Dot -->
    <circle cx="15" cy="18" r="9" fill="#ef4444" />
    
    <!-- Blue Pill -->
    <!-- Starting as vertical, rotating to get the / slant -->
    <!-- Pivot around center of the rect approx -->
    <rect x="22" y="10" width="16" height="40" rx="8" transform="rotate(30 30 30)" fill="#2563eb" />
  </g>
  
  <!-- Text -->
  <!-- Using White text for Dark Footer context -->
  <text x="75" y="53" font-family="'Outfit', sans-serif" font-weight="600" font-size="42" fill="white">Digexa</text>
</svg>
